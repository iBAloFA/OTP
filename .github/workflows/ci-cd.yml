name: FastAPI OTP CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code down from your GitHub repository onto the runner
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Initialize an isolated production Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' # Speeds up future workflow runs by caching packages

    # 3. Upgrade pip and install all required production dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 safety
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Lint your code to check for syntax errors or broken imports
    # This prevents deploying broken code that crashes your cloud instances
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings so the build doesn't crash on simple spacing rules
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 5. Security audit check on your installed open-source libraries
    - name: Run Safety Check (Vulnerability Scanner)
      run: |
        safety check --bare || echo "Security warnings found in packages, review updates."

  # Optional Deployment step: Automatically triggers your cloud platform to pull the fresh update
  deploy-prod:
    needs: test-and-validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only trigger live deployment on actual code merges, not PR tests
    
    steps:
    - name: Deploy Trigger
      run: |
        echo "✅ Tests passed perfectly! Initiating webhook handoff."
        # OPTIONAL FOR RENDER: 
        # Uncomment the line below and add your Render Deploy Webhook URL in GitHub Settings -> Secrets
        # curl -X GET "${{ secrets.RENDER_DEPLOY_WEBHOOK_URL }}"
